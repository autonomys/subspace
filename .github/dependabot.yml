# Dependabot version-update configuration.
#
# This file only governs scheduled version-update PRs. Security updates
# (CVE-driven) are configured separately in repo Settings → Code security
# & analysis and fire as alerts come in, independent of these groups.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # One grouped PR per week for the entire Cargo workspace. All update
  # types — patch, minor, major — go into the same PR.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    commit-message:
      prefix: deps
      include: scope
    groups:
      cargo-deps:
        update-types:
          - patch
          - minor
          - major

  # One grouped PR per week for all GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions-deps:
        update-types:
          - patch
          - minor
          - major
